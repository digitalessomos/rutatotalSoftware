<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- METADATOS PARA WHATSAPP / OPEN GRAPH -->
    <meta property="og:title" content="RutaTotal 360 | Paz Operativa">
    <!-- El texto que aparecerá abajo del título cuando compartas el link -->
    <meta property="og:description" content="Tu operación en control, así de simple. Mira en 20 segundos cómo eliminamos el caos de los pedidos.">
    <!-- REEMPLAZA EL CONTENIDO DE og:image CON EL LINK A LA MINIATURA / SCREENSHOT DEL VIDEO -->
    <meta property="og:image" content="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1200&auto=format&fit=crop">
    <meta property="og:url" content="https://tusitio.com/demo">
    <meta property="og:type" content="website">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RutaTotal 360 | Paz Operativa">
    <meta name="twitter:description" content="Tu operación en control, así de simple.">
    <meta name="twitter:image" content="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1200&auto=format&fit=crop">

    <title>RutaTotal 360 - Demo Express</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        brand: '#3b82f6', /* Color base del Glassmorphism azul */
                    }
                }
            }
        }
    </script>

    <style>
        body {
            /* Mismo fondo oscuro elegante que la landing principal */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* Efecto Cristal Principal */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Botón B (Secundario / Transparente) */
        .btn-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }
        .btn-glass:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Botón A (Primario / WhatsApp) */
        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            box-shadow: 0 10px 20px -5px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(37, 211, 102, 0.6);
        }
        
        /* Efecto de luz de fondo (Glowing blob) */
        .glowing-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.2) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(40px);
            animation: float 6s ease-in-out infinite alternate;
        }
        
        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-30px) scale(1.1); }
        }
    </style>
</head>
<body class="relative overflow-hidden selection:bg-brand selection:text-white p-4">

    <!-- Orbes de luz decorativos de fondo -->
    <div class="glowing-blob top-1/4 left-1/4"></div>
    <div class="glowing-blob bottom-1/4 right-1/4" style="background: radial-gradient(circle, rgba(139,92,246,0.15) 0%, rgba(0,0,0,0) 70%); animation-delay: -3s;"></div>

    <main class="w-full max-w-[420px] mx-auto z-10 relative">
        
        <!-- Tarjeta Central Glassmorphism -->
        <div class="glass-card rounded-3xl p-6 sm:p-8 flex flex-col gap-6 text-center">
            
            <!-- Título -->
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-gray-300 mb-1 leading-tight tracking-tight">
                    Tu operación en control,<br>
                    <span class="text-white text-xl sm:text-2xl font-light italic opacity-90">así de simple.</span>
                </h1>
            </div>

            <!-- Contenedor del Video -->
            <!-- format: aspect-video para horizontal (16:9) -->
            <div class="relative rounded-2xl overflow-hidden shadow-2xl bg-black aspect-video border border-white/10 ring-4 ring-white/5">
                
                <!-- REEMPLAZA ESTE SRC POR LA URL DE TU VIDEO EN FIREBASE/HOSTING -->
                <video 
                    src="videos/postprimermensaje.MOV" 
                    poster="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=400&auto=format&fit=crop"
                    autoplay 
                    muted 
                    loop 
                    playsinline 
                    class="w-full h-full object-cover"
                ></video>
                
                <!-- Etiqueta decorativa sobre el video -->
                <div class="absolute top-4 right-4 bg-black/60 backdrop-blur-md px-3 py-1.5 rounded-full text-xs font-semibold text-white/90 border border-white/10 flex items-center gap-1.5 shadow-lg">
                    <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
                    
                </div>
            </div>

            <!-- Texto intermedio CTA -->
            <p class="text-gray-300 text-[15px] font-light leading-relaxed">
                Es tan fácil que se aprende en <strong class="text-white font-semibold">5 min</strong>.<br> ¿Qué prefieres?
            </p>

            <!-- Botones de Acción (Reemplazar "TU_NUMERO" usando el formato código país sin el +. Ej: 5491122334455) -->
            <div class="flex flex-col gap-3 mt-1">
                
                <!-- Botón A: Prueba Gratis -->
                <!-- URL encode: los espacios se convierten a %20 -->
                <a href="https://wa.me/549TUNUMERO?text=Hola,%20quiero%20la%20cuenta%20de%20prueba%20gratis%20de%20RutaTotal%20360" target="_blank" class="btn-whatsapp w-full py-4 px-6 rounded-2xl font-bold text-white flex items-center justify-center gap-2 group text-[15px]">
                    <svg class="w-5 h-5 group-hover:rotate-12 transition-transform" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    A. Cuenta de prueba gratis
                </a>
                
                <!-- Botón B: Llamada rápida -->
                <a href="https://wa.me/549TUNUMERO?text=Hola,%20prefiero%20la%20llamada%20rápida%20de%207%20min." target="_blank" class="btn-glass w-full py-4 px-6 rounded-2xl font-semibold text-white/90 flex items-center justify-center gap-2 hover:text-white text-[15px]">
                    <svg class="w-5 h-5 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    B. Llamada rápida (7 min)
                </a>
            </div>
        </div>
    </main>

</body>
</html>
